<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 JARVIS - Panel de Control Remoto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #48bb78;
            --warning: #f6ad55;
            --danger: #f56565;
            --dark: #1a202c;
            --light: #f7fafc;
            --border: #e2e8f0;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--dark);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 2em;
            color: var(--primary);
        }

        .header-status {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: var(--light);
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* MAIN GRID */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* PANEL */
        .panel {
            background: white;
            border-radius: 15px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-body {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            max-height: 600px;
        }

        /* DISPOSITIVOS */
        .device-item {
            padding: 15px;
            margin-bottom: 10px;
            background: var(--light);
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .device-item:hover {
            background: #e6f0ff;
            transform: translateX(5px);
        }

        .device-name {
            font-weight: bold;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .device-info {
            font-size: 0.85em;
            color: #666;
        }

        .device-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background: var(--success);
        }

        /* COMANDOS */
        .commands-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .command-btn {
            padding: 12px 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-align: left;
            font-size: 0.9em;
        }

        .command-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .command-btn:active {
            transform: translateY(0);
        }

        /* TERMINAL */
        .terminal {
            background: #1a202c;
            color: #48bb78;
            font-family: 'Courier New', monospace;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .terminal-line {
            margin-bottom: 5px;
            word-break: break-all;
        }

        .terminal-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .terminal-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-family: 'Courier New', monospace;
        }

        .terminal-input button {
            padding: 10px 20px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* CHAT */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 15px;
            background: var(--light);
            border-radius: 8px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 8px;
            word-break: break-word;
        }

        .message.user .message-content {
            background: var(--primary);
            color: white;
        }

        .message.bot .message-content {
            background: white;
            border: 1px solid var(--border);
            color: var(--dark);
        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1em;
        }

        .chat-input button {
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .chat-input button:hover {
            background: var(--secondary);
        }

        /* BOTTOM GRID */
        .bottom-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) {
            .bottom-grid {
                grid-template-columns: 1fr;
            }
        }

        /* TABLA */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--light);
            padding: 12px;
            text-align: left;
            font-weight: bold;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: var(--light);
        }

        /* BADGES */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .badge-success {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge-warning {
            background: #feebc8;
            color: #7c2d12;
        }

        .badge-danger {
            background: #fed7d7;
            color: #742a2a;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .commands-grid {
                grid-template-columns: 1fr;
            }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--light);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary);
        }

        /* LOADING */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div>
                <h1>🤖 JARVIS - Panel de Control</h1>
            </div>
            <div class="header-status">
                <div class="status-item">
                    <div class="status-dot"></div>
                    <span>Sistema: <strong>Activo</strong></span>
                </div>
                <div class="status-item">
                    <div class="status-dot"></div>
                    <span>Dispositivos: <strong id="device-count">0</strong></span>
                </div>
            </div>
        </div>

        <!-- MAIN GRID -->
        <div class="main-grid">
            <!-- DISPOSITIVOS -->
            <div class="panel">
                <div class="panel-header">📱 Dispositivos Conectados</div>
                <div class="panel-body" id="devices-list">
                    <div style="text-align: center; padding: 20px;">
                        <div class="spinner"></div>
                        <p>Cargando dispositivos...</p>
                    </div>
                </div>
            </div>

            <!-- CENTRAL -->
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <!-- COMANDOS -->
                <div class="panel">
                    <div class="panel-header">⚙️ Comandos Rápidos</div>
                    <div class="panel-body">
                        <div class="commands-grid">
                            <button class="command-btn" onclick="executeCommand('info')">📊 Información</button>
                            <button class="command-btn" onclick="executeCommand('files')">📁 Archivos</button>
                            <button class="command-btn" onclick="executeCommand('apps')">📱 Aplicaciones</button>
                            <button class="command-btn" onclick="executeCommand('screenshot')">📸 Screenshot</button>
                            <button class="command-btn" onclick="executeCommand('battery')">🔋 Batería</button>
                            <button class="command-btn" onclick="executeCommand('storage')">💾 Almacenamiento</button>
                            <button class="command-btn" onclick="executeCommand('location')">📍 Ubicación</button>
                            <button class="command-btn" onclick="executeCommand('network')">🌐 Red</button>
                        </div>
                    </div>
                </div>

                <!-- TERMINAL -->
                <div class="panel">
                    <div class="panel-header">💻 Terminal</div>
                    <div class="panel-body">
                        <div class="terminal" id="terminal"></div>
                        <div class="terminal-input">
                            <input type="text" id="terminal-input" placeholder="Escribe comando..." onkeypress="if(event.key==='Enter') executeTerminalCommand()">
                            <button onclick="executeTerminalCommand()">Ejecutar</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CHAT -->
            <div class="panel">
                <div class="panel-header">💬 Chat con Jarvis</div>
                <div class="panel-body" style="display: flex; flex-direction: column;">
                    <div class="chat-messages" id="chat-messages"></div>
                    <div class="chat-input">
                        <input type="text" id="chat-input" placeholder="Pregunta a Jarvis..." onkeypress="if(event.key==='Enter') sendChatMessage()">
                        <button onclick="sendChatMessage()">📤</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM GRID -->
        <div class="bottom-grid">
            <!-- RED WIFI -->
            <div class="panel">
                <div class="panel-header">📡 Red WiFi</div>
                <div class="panel-body">
                    <table id="wifi-table">
                        <thead>
                            <tr>
                                <th>Dispositivo</th>
                                <th>IP</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="wifi-devices">
                            <tr>
                                <td colspan="3" style="text-align: center;">
                                    <div class="spinner"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- RED TAILSCALE -->
            <div class="panel">
                <div class="panel-header">🔗 Red Tailscale</div>
                <div class="panel-body">
                    <table id="tailscale-table">
                        <thead>
                            <tr>
                                <th>Dispositivo</th>
                                <th>IP</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tailscale-devices">
                            <tr>
                                <td colspan="3" style="text-align: center;">
                                    <div class="spinner"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Base
        const API_BASE = '/api';

        // Actualizar dispositivos
        async function updateDevices() {
            try {
                const response = await fetch(`${API_BASE}/devices`);
                const data = await response.json();
                
                const devicesList = document.getElementById('devices-list');
                document.getElementById('device-count').textContent = data.devices.length;

                if (data.devices.length === 0) {
                    devicesList.innerHTML = '<p style="text-align: center; color: #999;">No hay dispositivos conectados</p>';
                    return;
                }

                devicesList.innerHTML = data.devices.map(device => `
                    <div class="device-item" onclick="selectDevice('${device.ip}')">
                        <div class="device-name">
                            <span class="device-status"></span>
                            ${device.name}
                        </div>
                        <div class="device-info">
                            IP: ${device.ip} | MAC: ${device.mac}
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Error actualizando dispositivos:', e);
            }
        }

        // Actualizar red WiFi
        async function updateWiFiDevices() {
            try {
                const response = await fetch(`${API_BASE}/network/wifi`);
                const data = await response.json();
                
                const tbody = document.getElementById('wifi-devices');
                tbody.innerHTML = data.devices.map(device => `
                    <tr>
                        <td>${device.hostname}</td>
                        <td>${device.ip}</td>
                        <td><span class="badge badge-success">Activo</span></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Error actualizando WiFi:', e);
            }
        }

        // Actualizar red Tailscale
        async function updateTailscaleDevices() {
            try {
                const response = await fetch(`${API_BASE}/network/tailscale`);
                const data = await response.json();
                
                const tbody = document.getElementById('tailscale-devices');
                tbody.innerHTML = data.devices.map(device => `
                    <tr>
                        <td>${device.name}</td>
                        <td>${device.ip}</td>
                        <td><span class="badge badge-success">Conectado</span></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Error actualizando Tailscale:', e);
            }
        }

        // Ejecutar comando
        async function executeCommand(command) {
            const terminal = document.getElementById('terminal');
            terminal.innerHTML += `<div class="terminal-line">$ ${command}</div>`;
            
            try {
                const response = await fetch(`${API_BASE}/command`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command })
                });
                const data = await response.json();
                
                terminal.innerHTML += `<div class="terminal-line">${data.result || data.error}</div>`;
                terminal.scrollTop = terminal.scrollHeight;
            } catch (e) {
                terminal.innerHTML += `<div class="terminal-line">Error: ${e.message}</div>`;
            }
        }

        // Ejecutar comando de terminal
        async function executeTerminalCommand() {
            const input = document.getElementById('terminal-input');
            const cmd = input.value;
            
            if (!cmd) return;
            
            input.value = '';
            await executeCommand(cmd);
        }

        // Enviar mensaje al chat
        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value;
            
            if (!message) return;
            
            input.value = '';
            
            // Mostrar mensaje del usuario
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML += `
                <div class="message user">
                    <div class="message-content">${message}</div>
                </div>
            `;
            
            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                
                // Mostrar respuesta de Jarvis
                chatMessages.innerHTML += `
                    <div class="message bot">
                        <div class="message-content">${data.response}</div>
                    </div>
                `;
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (e) {
                chatMessages.innerHTML += `
                    <div class="message bot">
                        <div class="message-content">Error: ${e.message}</div>
                    </div>
                `;
            }
        }

        // Seleccionar dispositivo
        function selectDevice(ip) {
            console.log('Dispositivo seleccionado:', ip);
        }

        // Actualizar cada 5 segundos
        updateDevices();
        updateWiFiDevices();
        updateTailscaleDevices();

        setInterval(updateDevices, 5000);
        setInterval(updateWiFiDevices, 5000);
        setInterval(updateTailscaleDevices, 5000);
    </script>
</body>
</html>
